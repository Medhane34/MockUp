name: Sanity Dataset Backup - Debug

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Token loaded: $([ -n '${{ secrets.SANITY_TOKEN_PROJECT_MOCKUP }}' ] && echo 'YES' || echo 'NO')"
          echo "Project ID loaded: $([ -n '${{ secrets.SANITY_PROJECT_ID }}' ] && echo 'YES' || echo 'NO')"

      - name: Test Sanity CLI
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_TOKEN_PROJECT_MOCKUP }}
        run: |
          npx -y @sanity/cli@latest projects list 2>&1 || true

      - name: Export dataset
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_TOKEN_PROJECT_MOCKUP }}
        run: |
          npx -y @sanity/cli@latest dataset export \
            --project ${{ secrets.SANITY_PROJECT_ID }} \
            --dataset production \
            --no-drafts \
            --assets \
            backup.tar.gz 2>&1